<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 260px;
        padding: 12px;
        background: #0f172a;
        color: #e2e8f0;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      h1 {
        font-size: 14px;
        margin: 0 0 6px;
        font-weight: 600;
        color: #f8fafc;
        text-align: center;
      }

      button {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      button:active {
        transform: scale(0.97);
      }

      .export {
        background: #22c55e;
        color: #022c22;
      }

      .export:hover {
        background: #16a34a;
      }

      .import {
        background: #3b82f6;
        color: #0b1a3a;
      }

      .import:hover {
        background: #2563eb;
      }

      .restore {
        background: #f59e0b;
        color: #3b2f00;
      }

      .restore:hover {
        background: #d97706;
      }

      select {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #1e293b;
        background: #020617;
        color: #e2e8f0;
        font-size: 12px;
        outline: none;
      }

      select:focus {
        border-color: #3b82f6;
      }

      .divider {
        height: 1px;
        background: #1e293b;
        margin: 4px 0;
      }

      .footer {
        font-size: 10px;
        text-align: center;
        color: #64748b;
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>LocalStorage Backup</h1>

      <button id="exportBtn" class="export">Export</button>
      <button id="importBtn" class="import">Import</button>

      <div class="divider"></div>

      <select id="backupList"></select>
      <button id="restoreBtn" class="restore">Restore Backup</button>

      <div class="footer">5 backups</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
